<!DOCTYPE html>
<html>
<head>
<title>Employee Task Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


/* FULL IMAGE BACKGROUND */

.hero{
height:100vh;

background: 
linear-gradient(
rgba(0,0,0,0.55),
rgba(0,0,0,0.55)
),
url("{{ url_for('static', filename='images/task.jpg') }}");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
}


/* LEFT CONTENT */

.overlay{
color:white;
padding-left:80px;
max-width:600px;
}


/* TITLE */

.overlay h1{
font-size:60px;
font-weight:700;
line-height:1.2;
margin-bottom:25px;
letter-spacing:1px;
}


/* BUTTON */

.btn{
padding:14px 35px;
border-radius:30px;
border:none;

background:white;
color:#333;

font-size:18px;
font-weight:600;

cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="hero">

<div class="overlay">

<h1>
Employee Task <br>
Management System
</h1>

<a href="/login">
<button class="btn">Get Started</button>
</a>

</div>

</div>

</body>
</html>
