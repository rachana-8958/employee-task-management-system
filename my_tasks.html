{% extends "baseE.html" %}

{% block content %}

<style>
    .filters {
        margin-bottom: 20px;
    }

    .task-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .task-card {
        width: 300px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
    }

    .completed { color: green; }
    .pending { color: red; }
    .progress { color: orange; }
    
    .late-task {
    border: 2px solid red;
    background: #ffe6e6;
    }

</style>

<h2>My Tasks</h2>

<!-- 🔍 FILTER -->
<div class="filters">
    <select id="filter" onchange="filterTasks()">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
    </select>
</div>

<!-- 🧾 TASK CARDS -->
<div class="task-container" id="taskContainer">

    {% for t in tasks %}
<div class="task-card {% if t[6] %}late-task{% endif %}" data-status="{{t[5]}}">
        <h3>{{t[0]}}</h3>
        <p>{{t[1]}}</p>

<p>
<b>Deadline:</b> 
<span style="color: {% if t[6] %}red{% else %}black{% endif %};">
{{t[2]}}
</span>
</p>

        <p>
            <b>Status:</b>
            {% if t[3] == 'completed' %}
                <span class="completed">✔ Completed</span>
            {% elif t[3] == 'in_progress' %}
                <span class="progress">● In Progress</span>
            {% else %}
                <span class="pending">⏳ Pending</span>
            {% endif %}
        </p>

        <p>Progress: {{t[4]}}%</p>

        <!-- Progress bar -->
        <div style="height:8px; background:#ddd; border-radius:5px;">
            <div style="width:{{t[4]}}%; height:8px; background:green;"></div>
        </div>

    </div>
    {% endfor %}

</div>

<script>
function filterTasks() {
    let filter = document.getElementById("filter").value;
    let cards = document.querySelectorAll(".task-card");

    cards.forEach(card => {
        let status = card.getAttribute("data-status");

        if (filter === "all" || status === filter) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

{% endblock %}
