<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* BODY */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* LIGHT BLUE BACKGROUND */
background: linear-gradient(135deg,#e6f2ff,#d6e9ff,#cfe4ff);
}


/* REGISTER BOX */

.box{

background: white;

padding:40px;
border-radius:18px;
width:340px;
text-align:center;

/* STRONG SHADOW */
box-shadow:
0 30px 60px rgba(0,0,0,0.25),
0 10px 20px rgba(0,0,0,0.15);

transition:0.3s;

animation:fade 0.6s ease-in-out;
}


/* HOVER */

.box:hover{
transform: translateY(-5px);
box-shadow:
0 40px 80px rgba(0,0,0,0.30);
}


/* HEADING */

.box h2{
margin-bottom:20px;
color:#1f2937;
}


/* INPUT */

input{
width:100%;
padding:12px;
margin-top:12px;

border-radius:8px;
border:1px solid #d1d5db;

outline:none;
transition:0.3s;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 6px rgba(37,99,235,0.3);
}


/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:15px;

background:#1e40af;
color:white;

border:none;
border-radius:8px;

font-weight:600;
cursor:pointer;

transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
box-shadow:0 8px 15px rgba(0,0,0,0.2);
}


/* ANIMATION */

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">

<input 
name="username" 
placeholder="Username" 
required
>

<input 
type="password" 
name="password" 
placeholder="Password" 
required
>

<input 
name="full_name" 
placeholder="Full Name" 
required
>

<input 
name="email" 
placeholder="Email" 
required
>

<button>Register</button>

</form>

</div>

</body>
</html>
